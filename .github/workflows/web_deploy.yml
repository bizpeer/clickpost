name: Web Deploy (Next.js)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web_deploy.yml'

  pull_request:
    branches: [ main ]
    paths:
      - 'apps/web/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://trucxonuhorjvjtkcywd.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Admin dependencies
        working-directory: apps/web/admin
        run: npm install

      - name: Admin Build
        working-directory: apps/web/admin
        run: npm run build

      - name: Install Advertiser dependencies
        working-directory: apps/web/clickpost/clickpost
        run: npm install

      - name: Advertiser Build
        working-directory: apps/web/clickpost/clickpost
        run: npm run build

      - name: Prepare Deployment Directory
        run: |
          mkdir -p dist
          cp -r apps/web/clickpost/clickpost/dist/* dist/
          mkdir -p dist/admin
          cp -r apps/web/admin/out/* dist/admin/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
