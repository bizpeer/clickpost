name: Web Deploy (Next.js)

on:
  push:
    branches: [ mai
    paths:
      - 'apps/web/**'
          - '.github/workflows/web_deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/web/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://trucxonuhorjvjtkcywd.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_I4A5OYfb7C6qw6ik96uMIw_5wBg_xVk
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/web/admin/package-lock.json

      - name: Install dependencies
        working-directory: apps/web/admin
        run: npm install

      - name: Next.js Build
        working-directory: apps/web/admin
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/admin/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
