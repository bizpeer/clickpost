name: Mobile Deploy (Expo)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/mobile/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/mobile/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/mobile/clickpost/package-lock.json

      - name: Install dependencies
        working-directory: apps/mobile/clickpost
        run: npm install

      - name: Expo Validate & Build (Dry Run)
        working-directory: apps/mobile/clickpost
        run: npx expo lint || true # Lint if available, otherwise continue
